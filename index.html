<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشور وحفظ صورة</title>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    
    <style>
        body {
            /* font-family: Arial, sans-serif; */
            font-family: "Rubik", sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            /* height: 100vh; */
            margin: 0;
            flex-direction: column;

            /*  */

        }
        

        /* ********************** */
        .post-content {
            font-weight: weight;
        }
        .container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            width: 600px;
            padding: 10px;
            /* box-sizing: border-box; */
            margin-bottom: 20px;
        }
        .header {
            background-color: #007bff;
            color: #fff;
            text-align: center;
            padding: 10px;
            border-radius: 8px 8px 0 0;
        }
        .section {
            border: 1px solid #007bff;
            border-radius: 8px;
            width: 60%;
            padding: 10px;
            text-align: center;
            font-family: "Tahoma";
            font-size: 15px;
        }
        input, textarea {
            width: calc(100%);
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: Tahoma;
            font-size: 15px;
        }
        .upload-button {
            background-color: #28a745;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 5px;
            font-family: "Tahoma";
            font-size: 15px;
        }
        .upload-button:hover {
            background-color: #218838;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
        }
        .post {
            background-color: #fff;
            /* border-radius: 8px; */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            width: 600px;
            padding: 10px;
            margin-bottom: 20px;
            position: relative;
            
        }
        .post-header {
            display: flex;
            align-items: center;
            /* margin-bottom: 20px; */
        }
        .post-header img {
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        .post-header .user-info {
            display: flex;
            flex-direction: column;
            font-family: 'Arial';
        }
        .post-header .user-info .name {
            font-weight: bold;
        }
        .post-header .user-info .time {
            color: #616770;
            font-size: 11px;
        }
        .total-interactions {
            margin: auto;
            margin-left: 8px;
            display: flex;
            gap: 10px;
            font-size: 13px;
            color: #616770;
        }
        .post-content {
            /* font-family: 'Arial'; */
            font-family: "Rubik", sans-serif;
            margin-top: 10px;
            font-size: 20px;
            overflow-wrap: break-word;
            font-optical-sizing: auto;
            font-weight: weight;
            font-style: normal;
            padding-bottom: 4px;
            display: flex;
        }
        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
        .post-footer .actions {
            display: flex;
            margin-left: 5px;
        }
        .post-footer .actions span {
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-left: -9px;
        }


        .post-footer .counters {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #616770;
            margin-right: 10px;
        }
        .close-button {
            text-align: right;
        }
        .close-button img {
            position: absolute;
            top: 26px;
            right: 16px;
            width: 18px;
            opacity: 0.6;
            margin-right: 10px;
        }
        .hidden {
            display: none;
        }
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .avatar-section input[type="file"] {
            flex-grow: 1;
        }
        .verification-icon img {
            width: 18px;
            height: 18px;
            margin-left: 0px;
            vertical-align: middle;
            margin-bottom: 14px;
        }
        img#display-image{
            border-radius: 10px;
            margin: auto;
            width: 100%;
        }
    </style>

<style>
    @media (max-width: 768px) {
        .container {
            width: 95%; 
        }

        .post  {
            width: 95%; 
        }

        .post-content{
            font-size: 16px;
        }

        .post-footer .counters {
            display: flex;
            gap: 10px;
            font-size: 10px;
            color: #616770;
            margin-right: 10px;
        }
    }
</style>

<style>
    @media (max-width: 290px) {
        .container {
            width: 95%;
        }

        .post  {
            width: 95%; 
        }

        .post-content{
            font-size: 16px;
        }

        .post-footer .counters {
            display: flex;
            gap: 10px;
            font-size: 10px;
            color: #616770;
            
        }
    }
</style>
</head>

            <input type="number" id="comment-count" placeholder="Number of Comments" value="1" min="0" maxlength="5">
            <input type="number" id="share-count" placeholder="Number of Shares" value="1" min="0" maxlength="5">
        </div>
        <button id="toggle-actions" class="upload-button">إضافة أعداد التفاعل</button>
        <br>
        <button id="download-post" class="upload-button">تحميل صورة البوست</button>
    </div>

    <div class="post" id="post">
        <div class="close-button">

        <img src="more_icon_177186.png" alt="">

        <div class="post-header">

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.9.0/dist/html-to-image.min.js"></script>
    
    

 <script>
        function changeTimeText() {
            const timeOptions = ["30 minutes ago", "1 hour ago", "2 hours ago", "3 hours ago"];
            const randomIndex = Math.floor(Math.random() * timeOptions.length);
            const newTimeText = timeOptions[randomIndex];
            
            const timeElement = document.querySelector(".time#display-username");
            if (timeElement) {
                timeElement.textContent = newTimeText;
            }
        }

        // Change the time text when the page loads
        window.onload = changeTimeText;
    </script>



    <script>

const names = [
    "محمد", "علي", "Sam", "John", "Emily", "Ahmed", "Maria", "سارة",  "يوسف",
    "Ali", "مريم", "Mo", "Lily", "محمود", "Mark", "أمير", "Emma", "خالد", "Jacob"
];

function updateNameList() {
    // احتمالية عرض 3 أسماء عشوائية
    const randomNames = [];
    while (randomNames.length < 2) {
        const randomIndex = Math.floor(Math.random() * names.length);
        const randomName = names[randomIndex];
        if (!randomNames.includes(randomName)) {
            randomNames.push(randomName);
        }
    }

    const nameListElement = document.getElementById("name-list");
    nameListElement.textContent = randomNames.join(",");
    };
    updateNameList();
    </script>

    document.getElementById('name').addEventListener('input', function() {
    document.getElementById('display-name').innerText = this.value || 'Username';
});
document.getElementById('post-text').addEventListener('input', function() {
    var postContent = document.getElementById('display-text');
    var postText = this.value || 'Hello Power Family.';
    var isArabic = /[\u0600-\u06FF]/.test(postText); 
    postContent.innerText = postText;
    postContent.style.direction = isArabic ? 'rtl' : 'ltr';
});
document.getElementById('image-upload').addEventListener('change', function(event) {
    const reader = new FileReader();
    reader.onload = function() {
        const image = document.getElementById('display-image');
        image.src = reader.result;
        image.style.display = 'block';
    };
    if (event.target.files[0]) {
        reader.readAsDataURL(event.target.files[0]);
    }
});
document.getElementById('avatar-upload').addEventListener('change', function(event) {
    const reader = new FileReader();
    reader.onload = function() {
        const avatar = document.getElementById('display-avatar');
        avatar.src = reader.result;
    };
    if (event.target.files[0]) {
        reader.readAsDataURL(event.target.files[0]);
    }
});
document.getElementById('toggle-actions').addEventListener('click', function() {
    const interactionFields = document.getElementById('interaction-fields');
    const actionIcons = document.getElementById('action-icons');
    const totalInteractions = document.getElementById('total-interactions-value');
    if (interactionFields.classList.contains('hidden')) {
        interactionFields.classList.remove('hidden');
        actionIcons.classList.remove('hidden');
        totalInteractions.innerText = calculateTotalInteractions();
    } else {
        interactionFields.classList.add('hidden');
        actionIcons.classList.add('hidden');
    }
});
function calculateTotalInteractions() {
    const likeCount = parseInt(document.getElementById('like-count').value) || 0;
    const commentCount = parseInt(document.getElementById('comment-count').value) || 0;
    const shareCount = parseInt(document.getElementById('share-count').value) || 0;
    const totalInteractions = likeCount + commentCount + shareCount;
    let formattedTotal = totalInteractions.toString();
    if (totalInteractions >= 1000 && totalInteractions < 1000000) {
        formattedTotal = (totalInteractions / 1000).toFixed(1) + 'k';
    } else if (totalInteractions >= 1000000) {
        formattedTotal = (totalInteractions / 1000000).toFixed(1) + 'M';
    }
    return formattedTotal;
}
document.getElementById('like-count').addEventListener('input', function() {
    this.value = Math.max(0, parseInt(this.value)).toString().slice(0, 6);
    updateTotalInteractions();
});

document.getElementById('comment-count').addEventListener('input', function() {
    this.value = Math.max(0, parseInt(this.value)).toString().slice(0, 6);
    updateTotalInteractions();
});

document.getElementById('share-count').addEventListener('input', function() {
    this.value = Math.max(0, parseInt(this.value)).toString().slice(0, 6);
    updateTotalInteractions();
});

function formatNumber(num) {
    if (num >= 1000 && num < 1000000) {
        return (num / 1000).toFixed(1) + 'K';
    } else if (num >= 1000000) {
        return (num / 1000000).toFixed(1) + 'M';
    } else {
        return num.toString();
    }
}

function updateTotalInteractions() {
    const likeCount = parseInt(document.getElementById('like-count').value) || 0;
    const commentCount = parseInt(document.getElementById('comment-count').value) || 0;
    const shareCount = parseInt(document.getElementById('share-count').value) || 0;
    const totalInteractions = likeCount ;

    const formattedTotal = formatNumber(totalInteractions);

    const totalInteractionsElement = document.getElementById('total-interactions-value');
    totalInteractionsElement.innerText = formattedTotal;

    document.getElementById('comment-counter').innerText = `${formatNumber(commentCount)} Comments`;
    document.getElementById('share-counter').innerText = `${formatNumber(shareCount)} Shares`;
}
